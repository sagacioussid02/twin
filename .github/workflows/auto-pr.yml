name: Auto-create PR on branch push

on:
  push:
    branches-ignore:
      - main
      - SiddData

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR if it doesn't exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"

          # Check if a PR already exists for this branch
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for branch $BRANCH — skipping."
            exit 0
          fi

          # Build a title from the branch name (replace hyphens/underscores with spaces, title-case)
          TITLE=$(echo "$BRANCH" | sed 's/[-_]/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) substr($i,2); print}')

          gh pr create \
            --title "$TITLE" \
            --body "Automated PR for branch \`$BRANCH\`. Please review and update the description before merging." \
            --base main \
            --head "$BRANCH"
