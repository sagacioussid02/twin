name: Auto-create PR

on:
  push:
    branches-ignore: [main, SiddData]

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    name: Open PR if none exists
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for existing PR
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --head "${{ github.ref_name }}" --base main --json number --jq '.[0].number // ""')
          echo "pr_number=$PR" >> $GITHUB_OUTPUT

      - name: Generate PR description
        id: description
        if: steps.check.outputs.pr_number == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Collect commits since this branch diverged from main
          COMMITS=$(git log origin/main..HEAD --pretty=format:"- %s" | head -20)

          # Collect changed files
          FILES=$(git diff --name-only origin/main...HEAD | head -30 | sed 's/^/- /')

          BODY=$(cat <<EOF
          ## Summary
          Auto-generated PR for branch \`${{ github.ref_name }}\`.

          ## Commits
          ${COMMITS}

          ## Changed files
          ${FILES}

          ## Test plan
          - [ ] Security scan passes
          - [ ] Build artifacts succeed
          - [ ] Tested locally
          - [ ] No secrets exposed

          ---
          🤖 Generated with [Claude Code](https://claude.com/claude-code)
          EOF
          )

          # Write to file to handle multiline safely
          echo "$BODY" > /tmp/pr-body.txt

      - name: Create PR
        if: steps.check.outputs.pr_number == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          # Convert branch name to title: feature/create-your-twin → Create your twin
          TITLE=$(echo "$BRANCH" | sed 's|.*/||' | tr '-' ' ' | sed 's/\b\w/\u&/g')

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body-file /tmp/pr-body.txt

          echo "### PR Created ✅" >> $GITHUB_STEP_SUMMARY
          echo "Branch \`$BRANCH\` → \`main\`" >> $GITHUB_STEP_SUMMARY

      - name: PR already exists
        if: steps.check.outputs.pr_number != ''
        run: |
          echo "### PR already exists (#${{ steps.check.outputs.pr_number }}) — skipping" >> $GITHUB_STEP_SUMMARY
