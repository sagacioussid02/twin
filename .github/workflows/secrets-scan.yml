name: Secrets Scan

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    name: Gitleaks — detect exposed secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # full history so gitleaks can scan all commits on the branch

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Fails the job if any secrets are found.
        # To allow a false positive, add it to .gitleaks.toml in the repo root.

  detect-secrets:
    name: detect-secrets — baseline check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets
        run: |
          detect-secrets scan \
            --exclude-files 'package-lock\.json' \
            --exclude-files '\.venv/.*' \
            --exclude-files '__pycache__/.*' \
            --exclude-files 'lambda-package/.*' \
            --exclude-files 'lambda-deployment\.zip' \
            > .secrets.baseline.new

          # Show what was found
          cat .secrets.baseline.new | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          results = data.get('results', {})
          if results:
              print('⚠️  Potential secrets found:')
              for file, secrets in results.items():
                  for s in secrets:
                      print(f'  {file}:{s[\"line_number\"]} — {s[\"type\"]}')
              sys.exit(1)
          else:
              print('✅ No secrets detected')
          "
